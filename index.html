  <meta property="og:title" content="Hadeed — BAU Engineering Super App" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="icon" type="image/png" href="/rs.png?v=3" />
</head>

<body>
  <div id="root"></div>
  <script>
    // Emergency error catcher
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      var root = document.getElementById('root');
      if (root && root.innerHTML === '') {
        root.innerHTML = '<div style="padding:40px;color:#ef4444;background:#020617;font-family:sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">' +
          '<h1 style="font-size:2rem;font-weight:800;margin-bottom:1rem;">Loading Error</h1>' +
          '<p style="color:#94a3b8;margin-bottom:2rem;">The app failed to start. This is usually due to missing environment variables or a script error.</p>' +
          '<div style="background:rgba(255,255,255,0.05);padding:20px;border-radius:12px;text-align:left;max-width:600px;border:1px solid rgba(239,68,68,0.2);">' +
          '<p style="color:#f87171;font-family:monospace;margin:0;">' + msg + '</p>' +
          '</div>' +
          '<button onclick="window.location.reload()" style="margin-top:2rem;padding:12px 24px;background:white;color:black;border:none;border-radius:8px;font-weight:800;cursor:pointer;">Retry</button>' +
          '</div>';
      }
      return false;
    };
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
